aid: wine-vybe
name: Wine Vybe
description: >-
  Wine Vybe is a wine, beer, and liquor database API that provides information
  on wine regions, grape varieties, tasting notes, food pairing, awards, and
  brewery and distillery information. The API enables developers to build
  applications that help users discover and select wine and beverage products.
