          https://raw.githubusercontent.com/api-evangelist/wine-vybe/refs/heads/main/examples/wine-vybe-beer-example.json

  - aid: wine-vybe:wine-vybe-liquor-api
    name: Wine Vybe Liquor API
    description: >-
      The Wine Vybe Liquor API provides access to spirits and liquor data
      including distillery information, tasting notes, food pairing, and
      product details for whisky, cognac, tequila, vodka, rum, gin, brandy,
      armagnac, and more. Available through RapidAPI.
    humanURL: https://winevybe.com/
    baseURL: https://winevybe.com
    tags:
      - Beverages
      - Database
      - Distillery
